<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#06041a"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <!-- Milky Way band -->
    <linearGradient id="milky-way" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2a1860" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#3020a0" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#4838c8" stop-opacity="0.28"/>
      <stop offset="80%"  stop-color="#3020a0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2a1860" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <filter id="blur80"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur30"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur5"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Milky Way band — diagonal across canvas -->
  <g filter="url(#blur80)">
    <rect x="-200" y="-200" width="2600" height="400"
          transform="rotate(25, 960, 540)"
          fill="url(#milky-way)" opacity="0.9"/>
  </g>
  <g filter="url(#blur30)">
    <rect x="-200" y="-100" width="2600" height="200"
          transform="rotate(25, 960, 540)"
          fill="url(#milky-way)" opacity="0.7"/>
