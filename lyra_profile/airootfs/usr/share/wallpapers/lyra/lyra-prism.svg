<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0a0818"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <!-- Ray gradients — spread outward from center -->
    <linearGradient id="ray-v" x1="0.5" y1="0.5" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#6e6aff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-violet" x1="0.5" y1="0.5" x2="0" y2="0">
      <stop offset="0%"   stop-color="#8b3cf7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8b3cf7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-blue" x1="0.5" y1="0.5" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2f6bff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-pink" x1="0.5" y1="0.5" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b44fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b44fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-teal" x1="0.5" y1="0.5" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00c8cc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00c8cc" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur20"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Prism light rays — blurred wide beams from center -->
  <g filter="url(#blur20)" opacity="0.7">
    <!-- Upward ray -->
    <polygon points="960,540 900,0 1020,0"    fill="#6e6aff" opacity="0.55"/>
    <!-- Upper-right ray -->
    <polygon points="960,540 1350,0 1600,80"  fill="#2f6bff" opacity="0.45"/>
    <!-- Right ray -->
    <polygon points="960,540 1920,400 1920,680" fill="#8b3cf7" opacity="0.38"/>
    <!-- Lower-right ray -->
    <polygon points="960,540 1700,1000 1400,1080" fill="#b44fff" opacity="0.35"/>
    <!-- Downward ray -->
    <polygon points="960,540 900,1080 1020,1080" fill="#6e6aff" opacity="0.4"/>
    <!-- Lower-left ray -->
    <polygon points="960,540 520,1080 220,1000" fill="#8b3cf7" opacity="0.32"/>
    <!-- Left ray -->
    <polygon points="960,540 0,680 0,400"     fill="#2f6bff" opacity="0.38"/>
    <!-- Upper-left ray -->
    <polygon points="960,540 570,0 320,80"    fill="#6e6aff" opacity="0.42"/>
  </g>

  <!-- Tighter, brighter inner rays -->
  <g filter="url(#blur8)" opacity="0.85">
    <polygon points="960,540 930,0 990,0"     fill="#ffffff" opacity="0.12"/>
    <polygon points="960,540 1920,480 1920,600" fill="#6e6aff" opacity="0.2"/>
    <polygon points="960,540 0,480 0,600"     fill="#6e6aff" opacity="0.2"/>
    <polygon points="960,540 940,1080 980,1080" fill="#8b3cf7" opacity="0.15"/>
  </g>

  <!-- Diffraction color bands (prismatic arc at top) -->
  <g filter="url(#blur8)" opacity="0.5">
    <path d="M 540 0 Q 960 180 1380 0" fill="none" stroke="#ff6090" stroke-width="12"/>
    <path d="M 520 0 Q 960 200 1400 0" fill="none" stroke="#ff8060" stroke-width="10"/>
    <path d="M 500 0 Q 960 220 1420 0" fill="none" stroke="#ffcc00" stroke-width="8" opacity="0.5"/>
    <path d="M 480 0 Q 960 240 1440 0" fill="none" stroke="#00d4aa" stroke-width="8" opacity="0.5"/>
    <path d="M 460 0 Q 960 260 1460 0" fill="none" stroke="#2f6bff" stroke-width="10"/>
    <path d="M 440 0 Q 960 280 1480 0" fill="none" stroke="#8b3cf7" stroke-width="12"/>
  </g>

  <!-- Bright center point -->
  <circle cx="960" cy="540" r="80" fill="#6e6aff" filter="url(#blur20)" opacity="0.3"/>
  <circle cx="960" cy="540" r="30" fill="white"   filter="url(#blur8)"  opacity="0.15"/>

  <!-- Logo bloom -->
  <g filter="url(#logo-bloom)" opacity="0.85">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="#6e6aff"/>
      <g fill="none" stroke="#6e6aff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Logo crisp -->
  <g filter="url(#logo-glow)">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#logo-grad)"/>
      <g fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <text x="960" y="738" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="200" letter-spacing="14" fill="#8b3cf7" opacity="0.5">LYRA</text>
</svg>
