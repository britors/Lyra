<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#04021a"/>
      <stop offset="35%"  stop-color="#0a0628"/>
      <stop offset="65%"  stop-color="#160a38"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6e6aff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#4a44cc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <filter id="blur80"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur40"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur10"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Atmospheric glow near horizon -->
  <ellipse cx="960" cy="680" rx="900" ry="280" fill="#1a0a50" filter="url(#blur80)" opacity="0.6"/>
  <ellipse cx="960" cy="680" rx="500" ry="150" fill="#2a1060" filter="url(#blur40)" opacity="0.5"/>

  <!-- Stars in sky -->
  <g fill="white">
    <circle cx="80"   cy="60"  r="0.8" opacity="0.8"/><circle cx="200" cy="30"  r="0.6" opacity="0.6"/>
    <circle cx="320"  cy="75"  r="0.9" opacity="0.7"/><circle cx="460" cy="45"  r="0.5" opacity="0.5"/>
    <circle cx="590"  cy="25"  r="0.8" opacity="0.8"/><circle cx="720" cy="70"  r="0.6" opacity="0.6"/>
    <circle cx="840"  cy="38"  r="0.7" opacity="0.7"/><circle cx="1080" cy="55" r="0.8" opacity="0.8"/>
    <circle cx="1200" cy="20"  r="0.6" opacity="0.6"/><circle cx="1340" cy="68" r="0.9" opacity="0.7"/>
    <circle cx="1460" cy="35"  r="0.5" opacity="0.5"/><circle cx="1590" cy="80" r="0.8" opacity="0.8"/>
    <circle cx="1720" cy="42"  r="0.6" opacity="0.6"/><circle cx="1850" cy="28" r="0.7" opacity="0.7"/>
    <circle cx="140"  cy="160" r="0.7" opacity="0.6"/><circle cx="280" cy="130" r="0.5" opacity="0.5"/>
    <circle cx="420"  cy="180" r="0.8" opacity="0.7"/><circle cx="550" cy="145" r="0.6" opacity="0.6"/>
    <circle cx="1100" cy="150" r="0.7" opacity="0.6"/><circle cx="1250" cy="120" r="0.5" opacity="0.5"/>
    <circle cx="1420" cy="175" r="0.8" opacity="0.7"/><circle cx="1580" cy="140" r="0.6" opacity="0.6"/>
    <circle cx="1750" cy="165" r="0.7" opacity="0.6"/><circle cx="1880" cy="110" r="0.5" opacity="0.5"/>
    <!-- Brighter stars -->
    <circle cx="160"  cy="90"  r="1.4" opacity="0.9"/><circle cx="1760" cy="75" r="1.3" opacity="0.9"/>
    <circle cx="680"  cy="50"  r="1.2" opacity="0.8"/><circle cx="1280" cy="45" r="1.4" opacity="0.9"/>
  </g>
  <!-- Star halos -->
  <g filter="url(#blur4)">
    <circle cx="160" cy="90" r="3" fill="#c0d0ff" opacity="0.5"/>
    <circle cx="1760" cy="75" r="3" fill="#c0d0ff" opacity="0.5"/>
  </g>

  <!-- Logo bloom (in sky, above mountains) -->
  <g filter="url(#logo-bloom)" opacity="0.8">
    <svg x="810" y="260" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="#6e6aff"/>
      <g fill="none" stroke="#6e6aff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Logo crisp -->
  <g filter="url(#logo-glow)">
    <svg x="810" y="260" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#logo-grad)"/>
      <g fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <text x="960" y="608" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="200" letter-spacing="14" fill="#6e6aff" opacity="0.5">LYRA</text>

  <!-- Far mountains (background, lighter) -->
  <path d="M0 760 L180 580 L320 640 L480 510 L620 590 L760 480 L880 550 L960 460 L1040 550 L1160 480 L1300 590 L1440 510 L1580 640 L1740 580 L1920 640 L1920 1080 L0 1080 Z"
        fill="#140c30" opacity="0.85"/>
  <!-- Mid mountains -->
  <path d="M0 820 L120 700 L240 760 L380 660 L500 720 L640 640 L740 700 L860 610 L960 680 L1060 610 L1180 700 L1280 640 L1420 720 L1540 660 L1680 760 L1800 700 L1920 780 L1920 1080 L0 1080 Z"
        fill="#0c0820" opacity="0.9"/>
  <!-- Foreground mountains -->
  <path d="M0 900 L140 800 L260 860 L400 770 L520 840 L680 760 L800 830 L920 750 L960 800 L1000 750 L1120 830 L1240 760 L1400 840 L1520 770 L1660 860 L1780 800 L1920 870 L1920 1080 L0 1080 Z"
        fill="#070415"/>
  <!-- Valley floor -->
  <rect x="0" y="980" width="1920" height="100" fill="#050312"/>

  <!-- Snow/ice caps on tallest peaks (subtle violet glow) -->
  <g filter="url(#blur10)" opacity="0.3">
    <polygon points="960,460 930,510 990,510" fill="#a090ff"/>
    <polygon points="760,480 735,525 785,525" fill="#9080f0"/>
    <polygon points="1160,480 1135,525 1185,525" fill="#9080f0"/>
  </g>
</svg>
