<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#080620"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <filter id="glow-s" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-m" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur20"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Background horizontal scan lines (subtle CRT feel) -->
  <g stroke="#1a1540" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="80"  x2="1920" y2="80"/> <line x1="0" y1="160" x2="1920" y2="160"/>
    <line x1="0" y1="240" x2="1920" y2="240"/> <line x1="0" y1="320" x2="1920" y2="320"/>
    <line x1="0" y1="400" x2="1920" y2="400"/> <line x1="0" y1="480" x2="1920" y2="480"/>
    <line x1="0" y1="560" x2="1920" y2="560"/> <line x1="0" y1="640" x2="1920" y2="640"/>
    <line x1="0" y1="720" x2="1920" y2="720"/> <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="0" y1="880" x2="1920" y2="880"/> <line x1="0" y1="960" x2="1920" y2="960"/>
  </g>

  <!-- Neon frame / border rectangle -->
  <g filter="url(#blur8)" opacity="0.65">
    <rect x="80" y="60" width="1760" height="960" fill="none" stroke="#6e6aff" stroke-width="3" rx="4"/>
  </g>
  <rect x="80" y="60" width="1760" height="960" fill="none" stroke="#6e6aff" stroke-width="1" rx="4" opacity="0.5"/>

  <!-- Inner accent border -->
  <g filter="url(#blur8)" opacity="0.35">
    <rect x="120" y="100" width="1680" height="880" fill="none" stroke="#8b3cf7" stroke-width="1.5" rx="2"/>
  </g>
  <rect x="120" y="100" width="1680" height="880" fill="none" stroke="#8b3cf7" stroke-width="0.6" rx="2" opacity="0.3"/>

  <!-- Corner accents — glowing L-shapes -->
  <g filter="url(#glow-s)">
    <!-- Top-left -->
    <polyline points="80,180 80,60 200,60"   fill="none" stroke="#6e6aff" stroke-width="2"/>
    <!-- Top-right -->
    <polyline points="1740,60 1840,60 1840,180"  fill="none" stroke="#6e6aff" stroke-width="2"/>
    <!-- Bottom-left -->
    <polyline points="80,900 80,1020 200,1020"   fill="none" stroke="#6e6aff" stroke-width="2"/>
    <!-- Bottom-right -->
    <polyline points="1740,1020 1840,1020 1840,900" fill="none" stroke="#6e6aff" stroke-width="2"/>
  </g>

  <!-- Horizontal neon lines — decorative -->
  <g filter="url(#blur8)" opacity="0.5">
    <line x1="160" y1="160" x2="760"  y2="160" stroke="#2f6bff" stroke-width="1.5"/>
    <line x1="1160" y1="160" x2="1760" y2="160" stroke="#2f6bff" stroke-width="1.5"/>
    <line x1="160" y1="920" x2="760"  y2="920" stroke="#8b3cf7" stroke-width="1.5"/>
    <line x1="1160" y1="920" x2="1760" y2="920" stroke="#8b3cf7" stroke-width="1.5"/>
  </g>
  <g opacity="0.55">
    <line x1="160" y1="160" x2="760"  y2="160" stroke="#2f6bff" stroke-width="0.7"/>
    <line x1="1160" y1="160" x2="1760" y2="160" stroke="#2f6bff" stroke-width="0.7"/>
    <line x1="160" y1="920" x2="760"  y2="920" stroke="#8b3cf7" stroke-width="0.7"/>
    <line x1="1160" y1="920" x2="1760" y2="920" stroke="#8b3cf7" stroke-width="0.7"/>
  </g>

  <!-- Vertical accent lines -->
  <g filter="url(#blur8)" opacity="0.4">
    <line x1="200" y1="140" x2="200" y2="940" stroke="#6e6aff" stroke-width="1"/>
    <line x1="1720" y1="140" x2="1720" y2="940" stroke="#6e6aff" stroke-width="1"/>
  </g>
  <g opacity="0.3">
    <line x1="200" y1="140" x2="200" y2="940" stroke="#6e6aff" stroke-width="0.5"/>
    <line x1="1720" y1="140" x2="1720" y2="940" stroke="#6e6aff" stroke-width="0.5"/>
  </g>

  <!-- HUD-style tick marks along border -->
  <g stroke="#4a44cc" stroke-width="0.8" opacity="0.5">
    <!-- Top edge ticks -->
    <line x1="400"  y1="60" x2="400"  y2="80"/><line x1="600"  y1="60" x2="600"  y2="80"/>
    <line x1="800"  y1="60" x2="800"  y2="80"/><line x1="1000" y1="60" x2="1000" y2="80"/>
    <line x1="1120" y1="60" x2="1120" y2="80"/><line x1="1320" y1="60" x2="1320" y2="80"/>
    <line x1="1520" y1="60" x2="1520" y2="80"/>
    <!-- Bottom edge ticks -->
    <line x1="400"  y1="1000" x2="400"  y2="1020"/><line x1="600"  y1="1000" x2="600"  y2="1020"/>
    <line x1="800"  y1="1000" x2="800"  y2="1020"/><line x1="1000" y1="1000" x2="1000" y2="1020"/>
    <line x1="1120" y1="1000" x2="1120" y2="1020"/><line x1="1320" y1="1000" x2="1320" y2="1020"/>
    <line x1="1520" y1="1000" x2="1520" y2="1020"/>
    <!-- Left edge ticks -->
    <line x1="60" y1="280" x2="80" y2="280"/><line x1="60" y1="440" x2="80" y2="440"/>
    <line x1="60" y1="540" x2="80" y2="540"/><line x1="60" y1="640" x2="80" y2="640"/>
    <line x1="60" y1="800" x2="80" y2="800"/>
    <!-- Right edge ticks -->
    <line x1="1840" y1="280" x2="1860" y2="280"/><line x1="1840" y1="440" x2="1860" y2="440"/>
    <line x1="1840" y1="540" x2="1860" y2="540"/><line x1="1840" y1="640" x2="1860" y2="640"/>
    <line x1="1840" y1="800" x2="1860" y2="800"/>
  </g>

  <!-- Cross-hair center marker (subtle) -->
  <g stroke="#4a44cc" stroke-width="0.5" opacity="0.25">
    <line x1="940" y1="540" x2="980" y2="540"/>
    <line x1="960" y1="520" x2="960" y2="560"/>
  </g>

  <!-- Glowing dots at corners of inner frame -->
  <g filter="url(#glow-m)">
    <circle cx="120" cy="100" r="3" fill="#8b3cf7"/>
    <circle cx="1800" cy="100" r="3" fill="#8b3cf7"/>
    <circle cx="120" cy="980" r="3" fill="#8b3cf7"/>
    <circle cx="1800" cy="980" r="3" fill="#8b3cf7"/>
  </g>

  <!-- Logo bloom -->
  <g filter="url(#logo-bloom)" opacity="0.85">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="#6e6aff"/>
      <g fill="none" stroke="#6e6aff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Logo crisp -->
  <g filter="url(#logo-glow)">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#logo-grad)"/>
      <g fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <text x="960" y="738" text-anchor="middle" font-family="system-ui,monospace,sans-serif" font-size="26" font-weight="200" letter-spacing="14" fill="#6e6aff" opacity="0.55">LYRA</text>
  <!-- HUD readout text -->
  <text x="240" y="950" font-family="monospace,sans-serif" font-size="10" fill="#4a44cc" opacity="0.4" letter-spacing="2">SYS:READY</text>
  <text x="1560" y="950" text-anchor="end" font-family="monospace,sans-serif" font-size="10" fill="#4a44cc" opacity="0.4" letter-spacing="2">v1.0.0</text>
</svg>
