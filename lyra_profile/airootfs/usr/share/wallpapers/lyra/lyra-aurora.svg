<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#020510"/>
      <stop offset="40%"  stop-color="#060c1e"/>
      <stop offset="100%" stop-color="#0a1128"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8b3cf7" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#6e6aff" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#2f6bff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00a8cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8b3cf7" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#b44fff" stop-opacity="0.5"/>
      <stop offset="55%"  stop-color="#6e6aff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2f6bff" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#00d4aa" stop-opacity="0.45"/>
      <stop offset="65%"  stop-color="#2f6bff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#050a15"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <filter id="blur30"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur15"><feGaussianBlur stdDeviation="15"/></filter>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Aurora curtains — wide wavy bands -->
  <g filter="url(#blur30)">
    <!-- Band 1 — violet/blue, center-left -->
    <path d="M0 120 Q240 200 480 140 Q720 80 960 160 Q1200 240 1440 170 Q1680 100 1920 180 L1920 620 Q1680 540 1440 610 Q1200 680 960 600 Q720 520 480 590 Q240 660 0 580 Z"
          fill="url(#aurora1)" opacity="0.85"/>
    <!-- Band 2 — pink/violet, right-shifted -->
    <path d="M200 60 Q500 150 800 90 Q1100 30 1400 110 Q1650 180 1920 100 L1920 520 Q1650 600 1400 520 Q1100 440 800 510 Q500 580 200 500 Z"
          fill="url(#aurora2)" opacity="0.7"/>
    <!-- Band 3 — teal accent, left -->
    <path d="M0 200 Q300 130 600 200 Q900 270 1200 200 Q1500 130 1920 200 L1920 650 Q1500 580 1200 650 Q900 720 600 650 Q300 580 0 650 Z"
          fill="url(#aurora3)" opacity="0.6"/>
  </g>

  <!-- Aurora fine rays (vertical streaks) -->
  <g opacity="0.3" filter="url(#blur15)">
    <rect x="140"  y="0" width="18" height="700" fill="#6e6aff"/>
    <rect x="320"  y="0" width="12" height="600" fill="#8b3cf7"/>
    <rect x="510"  y="0" width="20" height="750" fill="#2f6bff"/>
    <rect x="700"  y="0" width="10" height="580" fill="#6e6aff"/>
    <rect x="880"  y="0" width="22" height="680" fill="#b44fff"/>
    <rect x="1060" y="0" width="14" height="700" fill="#2f6bff"/>
    <rect x="1250" y="0" width="18" height="620" fill="#6e6aff"/>
    <rect x="1430" y="0" width="10" height="750" fill="#8b3cf7"/>
    <rect x="1620" y="0" width="16" height="660" fill="#2f6bff"/>
    <rect x="1810" y="0" width="20" height="580" fill="#6e6aff"/>
  </g>

  <!-- Stars (peeking through aurora) -->
  <g fill="white">
    <circle cx="80"   cy="40"  r="0.8" opacity="0.6"/><circle cx="200"  cy="22"  r="0.6" opacity="0.5"/>
    <circle cx="340"  cy="55"  r="0.9" opacity="0.7"/><circle cx="460"  cy="30"  r="0.5" opacity="0.4"/>
    <circle cx="600"  cy="18"  r="0.7" opacity="0.6"/><circle cx="740"  cy="48"  r="0.6" opacity="0.5"/>
    <circle cx="860"  cy="25"  r="0.9" opacity="0.7"/><circle cx="1000" cy="15"  r="0.5" opacity="0.4"/>
    <circle cx="1140" cy="38"  r="0.7" opacity="0.6"/><circle cx="1280" cy="52"  r="0.6" opacity="0.5"/>
    <circle cx="1400" cy="20"  r="0.9" opacity="0.7"/><circle cx="1540" cy="44"  r="0.5" opacity="0.4"/>
    <circle cx="1680" cy="28"  r="0.7" opacity="0.6"/><circle cx="1820" cy="12"  r="0.6" opacity="0.5"/>
  </g>

  <!-- Ground silhouette (tree line) -->
  <path d="M0 900 L0 1080 L1920 1080 L1920 900 Q1800 880 1700 890 Q1650 870 1600 885 Q1540 860 1490 875 Q1430 855 1380 870 Q1310 845 1260 862 Q1200 840 1150 858 Q1080 835 1020 852 Q960 830 900 848 Q840 825 780 843 Q720 820 650 840 Q580 815 520 836 Q460 810 400 832 Q340 808 270 828 Q200 805 140 826 Q80 802 0 825 Z"
        fill="#020408"/>

  <!-- Logo bloom -->
  <g filter="url(#logo-bloom)" opacity="0.8">
    <svg x="810" y="360" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="#6e6aff"/>
      <g fill="none" stroke="#6e6aff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Logo crisp -->
  <g filter="url(#logo-glow)">
    <svg x="810" y="360" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#logo-grad)"/>
      <g fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <text x="960" y="708" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="200" letter-spacing="14" fill="#8b3cf7" opacity="0.5">LYRA</text>
</svg>
