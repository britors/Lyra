<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#050010"/>
      <stop offset="45%"  stop-color="#1a0040"/>
      <stop offset="70%"  stop-color="#3a0060"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <linearGradient id="horizon-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff40a0" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#ff2060" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c0020"/>
      <stop offset="100%" stop-color="#050010"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <!-- Sun gradient -->
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff80d0" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#ff40a0" stop-opacity="0.9"/>
      <stop offset="80%"  stop-color="#cc2060" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff2060"  stop-opacity="0"/>
    </radialGradient>
    <filter id="blur30"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="above-horizon">
      <rect x="0" y="0" width="1920" height="620"/>
    </clipPath>
    <clipPath id="below-horizon">
      <rect x="0" y="620" width="1920" height="460"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="620" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="620" width="1920" height="460" fill="url(#ground)"/>

  <!-- Horizon glow -->
  <rect x="0" y="540" width="1920" height="160" fill="url(#horizon-glow)" filter="url(#blur30)"/>

  <!-- Retro sun (semicircle) -->
  <g clip-path="url(#above-horizon)">
    <circle cx="960" cy="620" r="180" fill="url(#sun)" filter="url(#blur12)" opacity="0.9"/>
    <circle cx="960" cy="620" r="120" fill="#ff60b0" opacity="0.7"/>
    <!-- Scan lines across sun -->
    <g fill="#1a0040" opacity="0.55">
      <rect x="780" y="535" width="360" height="8"/>
      <rect x="780" y="552" width="360" height="8"/>
      <rect x="780" y="569" width="360" height="8"/>
      <rect x="780" y="586" width="360" height="8"/>
      <rect x="780" y="603" width="360" height="12"/>
    </g>
    <!-- Sun bright core -->
    <circle cx="960" cy="620" r="50" fill="#ffb0e8" filter="url(#blur4)" opacity="0.6"/>
  </g>

  <!-- Stars in sky -->
  <g fill="white" opacity="0.7">
    <circle cx="100"  cy="80"  r="0.8"/><circle cx="240"  cy="50"  r="0.6"/>
    <circle cx="380"  cy="95"  r="0.9"/><circle cx="520"  cy="40"  r="0.5"/>
    <circle cx="680"  cy="70"  r="0.8"/><circle cx="820"  cy="30"  r="0.7"/>
    <circle cx="1100" cy="70"  r="0.8"/><circle cx="1240" cy="30"  r="0.7"/>
    <circle cx="1400" cy="95"  r="0.9"/><circle cx="1540" cy="40"  r="0.5"/>
    <circle cx="1680" cy="80"  r="0.8"/><circle cx="1820" cy="50"  r="0.6"/>
    <circle cx="180"  cy="200" r="0.7"/><circle cx="480"  cy="180" r="0.6"/>
    <circle cx="1440" cy="180" r="0.6"/><circle cx="1740" cy="200" r="0.7"/>
    <circle cx="320"  cy="280" r="0.5"/><circle cx="1600" cy="280" r="0.5"/>
  </g>

  <!-- Perspective grid — floor -->
  <g stroke-linecap="square">
    <!-- Horizontal lines receding to vanishing point -->
    <g stroke="#ff40a0" opacity="0.5">
      <line x1="0" y1="660"  x2="1920" y2="660"  stroke-width="0.8"/>
      <line x1="0" y1="700"  x2="1920" y2="700"  stroke-width="0.7"/>
      <line x1="0" y1="745"  x2="1920" y2="745"  stroke-width="0.6"/>
      <line x1="0" y1="795"  x2="1920" y2="795"  stroke-width="0.6"/>
      <line x1="0" y1="850"  x2="1920" y2="850"  stroke-width="0.5"/>
      <line x1="0" y1="912"  x2="1920" y2="912"  stroke-width="0.5"/>
      <line x1="0" y1="980"  x2="1920" y2="980"  stroke-width="0.4"/>
      <line x1="0" y1="1056" x2="1920" y2="1056" stroke-width="0.4"/>
    </g>
    <!-- Vertical lines converging at horizon vanishing point x=960 -->
    <g stroke="#6e6aff" opacity="0.45">
      <line x1="960" y1="620" x2="0"    y2="1080" stroke-width="0.6"/>
      <line x1="960" y1="620" x2="240"  y2="1080" stroke-width="0.6"/>
      <line x1="960" y1="620" x2="480"  y2="1080" stroke-width="0.6"/>
      <line x1="960" y1="620" x2="720"  y2="1080" stroke-width="0.5"/>
      <line x1="960" y1="620" x2="1200" y2="1080" stroke-width="0.5"/>
      <line x1="960" y1="620" x2="1440" y2="1080" stroke-width="0.6"/>
      <line x1="960" y1="620" x2="1680" y2="1080" stroke-width="0.6"/>
      <line x1="960" y1="620" x2="1920" y2="1080" stroke-width="0.6"/>
      <line x1="960" y1="620" x2="120"  y2="1080" stroke-width="0.4"/>
      <line x1="960" y1="620" x2="360"  y2="1080" stroke-width="0.4"/>
      <line x1="960" y1="620" x2="600"  y2="1080" stroke-width="0.4"/>
      <line x1="960" y1="620" x2="840"  y2="1080" stroke-width="0.4"/>
      <line x1="960" y1="620" x2="1080" y2="1080" stroke-width="0.4"/>
      <line x1="960" y1="620" x2="1320" y2="1080" stroke-width="0.4"/>
      <line x1="960" y1="620" x2="1560" y2="1080" stroke-width="0.4"/>
      <line x1="960" y1="620" x2="1800" y2="1080" stroke-width="0.4"/>
    </g>
  </g>

  <!-- Grid glow overlay -->
  <g filter="url(#blur12)" opacity="0.25">
    <line x1="0" y1="700" x2="1920" y2="700" stroke="#ff40a0" stroke-width="4"/>
    <line x1="0" y1="795" x2="1920" y2="795" stroke="#ff40a0" stroke-width="3"/>
    <line x1="960" y1="620" x2="0"   y2="1080" stroke="#6e6aff" stroke-width="3"/>
    <line x1="960" y1="620" x2="1920" y2="1080" stroke="#6e6aff" stroke-width="3"/>
    <line x1="960" y1="620" x2="480" y2="1080" stroke="#6e6aff" stroke-width="2"/>
    <line x1="960" y1="620" x2="1440" y2="1080" stroke="#6e6aff" stroke-width="2"/>
  </g>

  <!-- Logo bloom -->
  <g filter="url(#logo-bloom)" opacity="0.85">
    <svg x="810" y="250" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="#6e6aff"/>
      <g fill="none" stroke="#6e6aff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Logo crisp -->
  <g filter="url(#logo-glow)">
    <svg x="810" y="250" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#logo-grad)"/>
      <g fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <text x="960" y="598" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="200" letter-spacing="14" fill="#ff80d0" opacity="0.55">LYRA</text>
</svg>
