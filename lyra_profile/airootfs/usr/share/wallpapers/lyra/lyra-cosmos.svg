<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0d0820"/>
      <stop offset="60%"  stop-color="#070515"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6e6aff" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#8b3cf7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2f6bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <filter id="blur120"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="blur60"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="960" cy="540" rx="780" ry="440" fill="url(#neb1)" filter="url(#blur120)"/>
  <ellipse cx="960" cy="540" rx="420" ry="260" fill="url(#neb1)" filter="url(#blur60)"/>
  <ellipse cx="380" cy="280" rx="380" ry="230" fill="url(#neb2)" filter="url(#blur120)" opacity="0.55"/>
  <ellipse cx="1570" cy="820" rx="320" ry="190" fill="url(#neb2)" filter="url(#blur120)" opacity="0.45"/>
  <ellipse cx="1650" cy="230" rx="280" ry="170" fill="url(#neb1)" filter="url(#blur120)" opacity="0.35"/>

  <!-- Star field -->
  <g fill="white">
    <circle cx="52"   cy="87"   r="0.7" opacity="0.7"/><circle cx="148" cy="213" r="0.5" opacity="0.5"/>
    <circle cx="267"  cy="44"   r="0.9" opacity="0.8"/><circle cx="391" cy="159" r="0.6" opacity="0.6"/>
    <circle cx="524"  cy="88"   r="0.8" opacity="0.7"/><circle cx="634" cy="247" r="0.5" opacity="0.5"/>
    <circle cx="751"  cy="33"   r="0.9" opacity="0.8"/><circle cx="879" cy="118" r="0.6" opacity="0.6"/>
    <circle cx="1023" cy="71"   r="0.8" opacity="0.7"/><circle cx="1151" cy="199" r="0.5" opacity="0.5"/>
    <circle cx="1283" cy="51"   r="0.9" opacity="0.8"/><circle cx="1401" cy="138" r="0.6" opacity="0.6"/>
    <circle cx="1556" cy="79"   r="0.8" opacity="0.7"/><circle cx="1683" cy="228" r="0.5" opacity="0.5"/>
    <circle cx="1822" cy="62"   r="0.9" opacity="0.8"/>
    <circle cx="98"   cy="398"  r="0.7" opacity="0.6"/><circle cx="223" cy="502" r="0.5" opacity="0.5"/>
    <circle cx="355"  cy="348"  r="0.8" opacity="0.7"/>
    <circle cx="178"  cy="702"  r="0.7" opacity="0.6"/><circle cx="304" cy="821" r="0.5" opacity="0.5"/>
    <circle cx="452"  cy="748"  r="0.8" opacity="0.7"/><circle cx="601" cy="899" r="0.6" opacity="0.6"/>
    <circle cx="754"  cy="823"  r="0.7" opacity="0.5"/><circle cx="899" cy="951" r="0.5" opacity="0.6"/>
    <circle cx="1051" cy="872"  r="0.8" opacity="0.7"/><circle cx="1203" cy="928" r="0.6" opacity="0.5"/>
    <circle cx="1353" cy="802"  r="0.7" opacity="0.6"/><circle cx="1502" cy="921" r="0.5" opacity="0.5"/>
    <circle cx="1651" cy="843"  r="0.8" opacity="0.7"/><circle cx="1804" cy="969" r="0.6" opacity="0.6"/>
    <circle cx="1705" cy="452"  r="0.7" opacity="0.6"/><circle cx="1851" cy="552" r="0.5" opacity="0.5"/>
    <!-- brighter foreground stars -->
    <circle cx="123"  cy="153"  r="1.6" opacity="0.9"/><circle cx="1783" cy="201" r="1.5" opacity="0.9"/>
    <circle cx="403"  cy="901"  r="1.3" opacity="0.8"/><circle cx="1598" cy="703" r="1.2" opacity="0.8"/>
    <circle cx="755"  cy="44"   r="1.4" opacity="0.9"/><circle cx="1100" cy="920" r="1.3" opacity="0.8"/>
  </g>
  <!-- sparkle stars with blur -->
  <g filter="url(#blur4)">
    <circle cx="123" cy="153" r="3"  fill="#a0b0ff" opacity="0.6"/>
    <circle cx="755" cy="44"  r="2.5" fill="white"  opacity="0.5"/>
    <circle cx="1598" cy="703" r="2.5" fill="#a0c0ff" opacity="0.5"/>
  </g>

  <!-- Logo bloom -->
  <g filter="url(#logo-bloom)" opacity="0.75">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="#6e6aff"/>
      <g fill="none" stroke="#6e6aff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Logo crisp -->
  <g filter="url(#logo-glow)">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#logo-grad)"/>
      <g fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Label -->
  <text x="960" y="738" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="200" letter-spacing="14" fill="#6e6aff" opacity="0.55">LYRA</text>
</svg>
