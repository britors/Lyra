<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#080520"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1"    stop-color="#8b3cf7"/>
    </linearGradient>
    <filter id="logo-bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Concentric sound wave ellipses emanating from center -->
  <!-- Each ring: progressively larger, fading opacity, alternating colors -->
  <g fill="none" stroke-linecap="round">
    <ellipse cx="960" cy="540" rx="55"  ry="35"  stroke="#6e6aff" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="960" cy="540" rx="105" ry="68"  stroke="#6e6aff" stroke-width="1.4" opacity="0.82"/>
    <ellipse cx="960" cy="540" rx="158" ry="102" stroke="#7060ff" stroke-width="1.3" opacity="0.74"/>
    <ellipse cx="960" cy="540" rx="214" ry="138" stroke="#7860ff" stroke-width="1.2" opacity="0.66"/>
    <ellipse cx="960" cy="540" rx="272" ry="175" stroke="#8b3cf7" stroke-width="1.1" opacity="0.58"/>
    <ellipse cx="960" cy="540" rx="333" ry="215" stroke="#9040ef" stroke-width="1.0" opacity="0.50"/>
    <ellipse cx="960" cy="540" rx="396" ry="255" stroke="#9545e8" stroke-width="0.9" opacity="0.43"/>
    <ellipse cx="960" cy="540" rx="462" ry="297" stroke="#8b3cf7" stroke-width="0.9" opacity="0.37"/>
    <ellipse cx="960" cy="540" rx="530" ry="341" stroke="#6e6aff" stroke-width="0.8" opacity="0.31"/>
    <ellipse cx="960" cy="540" rx="601" ry="387" stroke="#5a60ff" stroke-width="0.7" opacity="0.26"/>
    <ellipse cx="960" cy="540" rx="674" ry="433" stroke="#4a55ff" stroke-width="0.7" opacity="0.21"/>
    <ellipse cx="960" cy="540" rx="749" ry="481" stroke="#3a4aff" stroke-width="0.6" opacity="0.17"/>
    <ellipse cx="960" cy="540" rx="827" ry="530" stroke="#2f6bff" stroke-width="0.6" opacity="0.14"/>
    <ellipse cx="960" cy="540" rx="907" ry="581" stroke="#2f6bff" stroke-width="0.5" opacity="0.11"/>
    <ellipse cx="960" cy="540" rx="990" ry="634" stroke="#2f6bff" stroke-width="0.5" opacity="0.08"/>
    <ellipse cx="960" cy="540" rx="1076" ry="689" stroke="#2f6bff" stroke-width="0.4" opacity="0.06"/>
  </g>

  <!-- Subtle radial scan lines -->
  <g stroke="#6e6aff" stroke-width="0.3" opacity="0.08">
    <line x1="960" y1="540" x2="960" y2="0"/>
    <line x1="960" y1="540" x2="960" y2="1080"/>
    <line x1="960" y1="540" x2="0"    y2="540"/>
    <line x1="960" y1="540" x2="1920" y2="540"/>
    <line x1="960" y1="540" x2="280"  y2="0"/>
    <line x1="960" y1="540" x2="1640" y2="0"/>
    <line x1="960" y1="540" x2="280"  y2="1080"/>
    <line x1="960" y1="540" x2="1640" y2="1080"/>
    <line x1="960" y1="540" x2="0"    y2="190"/>
    <line x1="960" y1="540" x2="1920" y2="190"/>
    <line x1="960" y1="540" x2="0"    y2="890"/>
    <line x1="960" y1="540" x2="1920" y2="890"/>
  </g>

  <!-- Logo bloom -->
  <g filter="url(#logo-bloom)" opacity="0.85">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="#6e6aff"/>
      <g fill="none" stroke="#6e6aff" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <!-- Logo crisp -->
  <g filter="url(#logo-glow)">
    <svg x="810" y="390" width="300" height="300" viewBox="0 0 256 256">
      <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#logo-grad)"/>
      <g fill="none" stroke="url(#logo-grad)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
        <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
        <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
        <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
        <path d="M104 84 L 109 192" stroke-width="5"/>
        <path d="M120 82 L 122 196" stroke-width="5"/>
        <path d="M136 82 L 134 196" stroke-width="5"/>
        <path d="M152 84 L 147 192" stroke-width="5"/>
      </g>
    </svg>
  </g>

  <text x="960" y="738" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="200" letter-spacing="14" fill="#6e6aff" opacity="0.45">LYRA</text>
</svg>
