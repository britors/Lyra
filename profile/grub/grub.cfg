# Lyra OS — GRUB menu for the live ISO (UEFI + BIOS eltorito).
# Default boot uses the open nouveau driver (safe everywhere). A second entry
# loads the NVIDIA proprietary/open driver for users whose GPU needs it — kept
# separate because the GSP firmware path can break boot on some laptops (§6).

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    set gfxmode="auto"
    insmod all_video
    insmod gfxterm
    terminal_output gfxterm
fi

set default="0"
set timeout=15
set timeout_style="menu"

# Branding (Lyra theme assets are placed by mkarchiso under ${prefix}).
if background_image /%INSTALL_DIR%/boot/lyra-boot-bg.png ; then
    true
fi

# NVIDIA modules to disable when running the safe default.
set nvidia_blacklist="modprobe.blacklist=nvidia,nvidia_drm,nvidia_uvm,nvidia_modeset"

menuentry "Iniciar Lyra OS (recomendado)" --class lyra {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% nouveau.modeset=1 ${nvidia_blacklist} quiet splash
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "Iniciar Lyra OS (drivers proprietários NVIDIA)" --class lyra {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% nvidia_drm.modeset=1 modprobe.blacklist=nouveau quiet splash
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "Iniciar Lyra OS (modo de segurança / nomodeset)" --class lyra {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% nomodeset ${nvidia_blacklist}
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

if [ "${grub_platform}" == "efi" ]; then
    menuentry "Configurações de firmware UEFI" {
        fwsetup
    }
fi

menuentry "Reiniciar" { reboot }
menuentry "Desligar" { halt }
up
    }
fi

menuentry "Reiniciar" { reboot }
menuentry "Desligar" { halt }
