# Lyra OS — pacman.conf used BY mkarchiso to build the live image.
# Mirrors a standard Arch config but enables multilib (gaming, §8) and a local
# repository that holds the curated AUR builds (Pamac, NVIDIA legacy, W3TI apps,
# lyra-kernel-manager — see aur/build-aur.sh, §5/§9).

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# Curated local repo. Built by aur/build-aur.sh into out/lyra-local/.
# `lyra-local` is searched before AUR-equivalent names so the live image is
# self-contained and reproducible (no network AUR fetch during mkarchiso).
[lyra-local]
SigLevel = Optional TrustAll
Server = file:///__LYRA_LOCAL_REPO__
