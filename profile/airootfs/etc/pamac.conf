# Lyra OS — Pamac configuration (§5)
# Graphical store. Flatpak/Flathub is the recommended path for end users; AUR is
# enabled but gated behind Pamac's built-in third-party disclaimer so a
# non-technical user does not stumble into it unaware ("advanced area", §5).

## Number of versions of each package to keep in the cache.
KeepNumPackages = 3
OnlyRmUninstalled = false

## Refresh period in hours.
RefreshPeriod = 6
NoUpdateHideIcon

## Enable Flatpak support and check Flathub for updates (§5).
EnableFlatpak
CheckFlatpakUpdates

## Enable AUR support. Pamac shows its third-party/"use at your own risk"
## warning whenever AUR packages are involved — that disclaimer is the
## "advanced area" gate required by §5. Do NOT disable it.
EnableAUR
CheckAURUpdates
## Keep built AUR packages so reinstalls are fast.
KeepBuiltPkgs
