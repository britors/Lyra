# Lyra OS — pacman.conf for the LIVE and INSTALLED system.
# (Distinct from profile/pacman.conf, which is only used by mkarchiso and adds
# the temporary lyra-local build repo.)
[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
ILoveCandy
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# multilib is required for Steam and 32-bit gaming libraries (§5/§8).
[multilib]
Include = /etc/pacman.d/mirrorlist
