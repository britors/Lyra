# Lyra OS — mkinitcpio HOOKS for the LIVE ISO initramfs (archiso).
# Identical to the upstream releng archiso.conf: the live image must boot on any
# hardware (no autodetect) and includes the archiso hooks that mount the
# squashfs. The INSTALLED system uses a different hook set (calamares
# initcpiocfg.conf): base/udev/.../btrfs/grub-btrfs-overlayfs.
HOOKS=(base udev plymouth microcode modconf kms memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
