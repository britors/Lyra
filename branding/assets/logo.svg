<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lyra OS">
  <defs>
    <!-- Sapphire -> violet, per the Lyra brand (§1/§10). -->
    <linearGradient id="lyra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#6e6aff"/>
      <stop offset="1" stop-color="#8b3cf7"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.46" r="0.6">
      <stop offset="0" stop-color="#6e6aff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#6e6aff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft halo -->
  <circle cx="128" cy="124" r="120" fill="url(#halo)"/>

  <!-- star / sparkle on top -->
  <path d="M128 16 L134 36 L154 42 L134 48 L128 68 L122 48 L102 42 L122 36 Z" fill="url(#lyra)"/>

  <g fill="none" stroke="url(#lyra)" stroke-linecap="round" stroke-linejoin="round">
    <!-- lyre arms: flare outward and rise, open at the top -->
    <path d="M112 196 C 84 188 68 156 68 118 C 68 98 70 84 74 76" stroke-width="11"/>
    <path d="M144 196 C 172 188 188 156 188 118 C 188 98 186 84 182 76" stroke-width="11"/>
    <!-- yoke / crossbar bridging the two arm tips -->
    <path d="M70 80 C 100 66 156 66 186 80" stroke-width="11"/>
    <!-- sound box (bowl) at the bottom -->
    <path d="M104 190 C 116 212 140 212 152 190" stroke-width="11"/>
    <!-- strings -->
    <path d="M104 84 L 109 192" stroke-width="5"/>
    <path d="M120 82 L 122 196" stroke-width="5"/>
    <path d="M136 82 L 134 196" stroke-width="5"/>
    <path d="M152 84 L 147 192" stroke-width="5"/>
  </g>
</svg>
