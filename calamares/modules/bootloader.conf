# Lyra OS — bootloader (§4/§11)
# GRUB is mandatory: grub-btrfs injects "boot into snapshot" entries into its
# menu, giving terminal-free recovery after a bad update.
---
efiBootLoader: "grub"
kernel: "/boot/vmlinuz-linux-zen"
img: "/boot/initramfs-linux-zen.img"
fallback: "/boot/initramfs-linux-zen-fallback.img"
timeout: "5"
bootloaderEntryName: "Lyra OS"
kernelLine: ", Lyra"
fallbackKernelLine: ", Lyra (fallback)"

grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootloaderId: "Lyra"
installEFIFallback: true
