# Lyra OS — mkinitcpio HOOKS for the installed system.
# btrfs hook + the modules needed to mount the Btrfs root early (§4). The crypt
# hook is included so optional disk encryption keeps working.
---
kernel: linux-zen
hooks:
  - base
  - udev
  - plymouth
  - autodetect
  - microcode
  - modconf
  - kms
  - keyboard
  - keymap
  - consolefont
  - block
  - filesystems
  - fsck
  - grub-btrfs-overlayfs
modules:
  - btrfs
