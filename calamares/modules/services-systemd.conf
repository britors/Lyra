# Lyra OS — enable services on the installed system (§4/§5)
---
units:
  - name: NetworkManager.service
    action: enable
  - name: bluetooth.service
    action: enable
  - name: sddm.service
    action: enable
  - name: lyra-flatpak-setup.service     # configure Flathub (§5)
    action: enable
  # Btrfs snapshots / recovery (§4)
  - name: snapper-timeline.timer
    action: enable
  - name: snapper-cleanup.timer
    action: enable
  - name: grub-btrfsd.service            # regenerate snapshot boot entries
    action: enable
  # Live-only — make sure it never runs on the installed system.
  - name: lyra-live-setup.service
    action: disable
  - name: systemd-networkd-wait-online.service
    action: mask
