# Lyra OS — user account creation (§11)
---
defaultGroups:
  - wheel
  - audio
  - video
  - storage
  - network
  - input
  - lp
  - scanner
autologinGroup: autologin
doAutologin: false
sudoersGroup: wheel
setRootPassword: false      # sudo via wheel; no separate root password prompt
availableShells: /bin/bash, /usr/bin/zsh
avatarFilePath: ~/.face
userShell: /bin/bash

passwordRequirements:
  minLength: 6
  maxLength: -1
  libpwquality:
    - minlen=6
    - minclass=0
