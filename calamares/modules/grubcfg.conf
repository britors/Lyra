# Lyra OS — /etc/default/grub settings written before grub-mkconfig (§4/§10)
---
overwrite: false
keep: true
defaults:
    GRUB_TIMEOUT: 5
    GRUB_TIMEOUT_STYLE: "menu"
    GRUB_CMDLINE_LINUX_DEFAULT: "quiet splash loglevel=3 rd.udev.log_level=3"
    GRUB_DISTRIBUTOR: "Lyra OS"
    # Detect Windows / other OSes for dual-boot.
    GRUB_DISABLE_OS_PROBER: "false"
    # Keep submenu entries flat so grub-btrfs snapshots are easy to reach (§4).
    GRUB_DISABLE_SUBMENU: "false"
