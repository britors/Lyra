# Lyra OS — mount options (§4)
# compress=zstd keeps the rolling install small; noatime + the snapshot-friendly
# subvolume options match the grub-btrfs/snapper layout.
---
extraMounts:
  - device: proc
    fs: proc
    mountPoint: /proc
  - device: sys
    fs: sysfs
    mountPoint: /sys
  - device: /dev
    mountPoint: /dev
    options: [ bind ]
  - device: tmpfs
    fs: tmpfs
    mountPoint: /run
  - device: /dev/pts
    fs: devpts
    mountPoint: /dev/pts

mountOptions:
  - filesystem: default
    options: [ defaults, noatime ]
  - filesystem: btrfs
    options: [ defaults, noatime, compress=zstd:1, ssd, space_cache=v2 ]
  - filesystem: efi
    options: [ defaults, umask=0077 ]
