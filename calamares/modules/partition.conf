# Lyra OS — partitioning (§4/§11)
# Btrfs with subvolumes laid out so Snapper + snap-pac + grub-btrfs work and so
# rolling back the system never touches the user's data in @home.
---
efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: LYRA_EFI

userSwapChoices:
  - none
  - small
  - suspend

drawNestedPartitions:   true
alwaysShowPartitionLabels: true
defaultFileSystemType:  "btrfs"
availableFileSystemTypes: [ "btrfs", "ext4" ]

# Subvolume layout consumed by snapper/grub-btrfs (§4). Snapshots of @ never
# affect @home, and @snapshots is excluded from being snapshotted.
btrfsSubvolumes:
  - mountPoint: /
    subvolume: /@
  - mountPoint: /home
    subvolume: /@home
  - mountPoint: /var/log
    subvolume: /@log
  - mountPoint: /var/cache/pacman/pkg
    subvolume: /@pkg
  - mountPoint: /.snapshots
    subvolume: /@snapshots

initialPartitioningChoice: erase
initialSwapChoice: none
