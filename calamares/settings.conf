# Lyra OS — Calamares installer configuration (§11).
# Lives at /etc/calamares/settings.conf on the live image.
---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
- id:     gpu
  module: shellprocess
  config: shellprocess-gpu.conf
- id:     livecleanup
  module: shellprocess
  config: shellprocess-livecleanup.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - networkcfg
  - hwclock
  - services-systemd
  - shellprocess@gpu          # install the right GPU driver for this machine (§6)
  - initcpiocfg
  - initcpio
  - grubcfg
  - bootloader                # GRUB (§4/§11)
  - shellprocess@livecleanup  # strip live-only user/services (§11)
  - umount
- show:
  - finished

branding: lyra

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
quit-at-end: false
